name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.vscode_target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            vscode_target: linux-x64
          - goos: linux
            goarch: arm64
            vscode_target: linux-arm64
          - goos: darwin
            goarch: amd64
            vscode_target: darwin-x64
          - goos: darwin
            goarch: arm64
            vscode_target: darwin-arm64
          - goos: windows
            goarch: amd64
            vscode_target: win32-x64
            bin_suffix: .exe
          - goos: windows
            goarch: arm64
            vscode_target: win32-arm64
            bin_suffix: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build k6-debug binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -o k6-debug${{ matrix.bin_suffix || '' }} \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            ./cmd/k6debug/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install extension dependencies
        working-directory: vscode/k6-debug-extension
        run: npm ci

      - name: Bundle binary and package vsix
        working-directory: vscode/k6-debug-extension
        run: |
          mkdir -p bin
          cp ../../k6-debug${{ matrix.bin_suffix || '' }} bin/
          cp ../../LICENSE .
          chmod +x bin/k6-debug${{ matrix.bin_suffix || '' }} || true
          npx vsce package \
            --target ${{ matrix.vscode_target }} \
            --no-git-tag-version \
            --no-update-package-json

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: vscode/k6-debug-extension/*.vsix
          retention-days: 1

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
